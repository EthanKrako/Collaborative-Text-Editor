services:
  frontend:
    build:
      context: ./frontend/collaborative-text-editor
      target: dev
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/collaborative-text-editor:/app     # Link files between host and container so angular reload works
      - /app/node_modules                             # make the container node_modules a volume so it's not overridden

  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app 
  db:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD}
    volumes:
      - 'collab_editor_db_data:/data/db'

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://root:${MONGODB_ROOT_PASSWORD}@db:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: user
      ME_CONFIG_BASICAUTH_PASSWORD: pass

volumes:
  collab_editor_db_data: